<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - EMP TRACK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 0; background: #f4f7fe;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; width: 100%;
        }

        .profile-card { 
            width: 95%; max-width: 650px;
            background: #fff; padding: 30px; border-radius: 25px; 
            box-shadow: 0px 15px 35px rgba(112, 144, 176, 0.1);
            display: flex; flex-direction: column; align-items: center;
        }

        .header-text { text-align: center; margin-bottom: 20px; }
        .header-text h2 { margin: 0; color: #1b2559; font-size: 22px; font-weight: 800; }
        .header-text p { margin: 5px 0 0; color: #a3aed0; font-size: 14px; font-weight: 600; }

        /* Profile Image Section */
        .img-area { margin-bottom: 25px; position: relative; }
        .profile-img { 
            width: 130px; height: 130px; border-radius: 50%; 
            border: 4px solid #4318ff; object-fit: cover; 
            background: #f4f7fe;
        }
        .upload-badge {
            position: absolute; bottom: 8px; right: 8px; 
            background: #4318ff; color: white; width: 35px; height: 35px; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .upload-badge:hover { background: #3311cc; transform: scale(1.1); }

        /* Detail Input Grid */
        .detail-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 15px; width: 100%;
        }
        .info-box { 
            background: #f8faff; padding: 12px 15px; 
            border-radius: 12px; border: 1px solid #f1f4f9; 
            transition: 0.3s;
        }
        .info-box:focus-within {
            border-color: #4318ff;
            background: #fff;
            box-shadow: 0 4px 12px rgba(67, 24, 255, 0.05);
        }
        .info-box label { 
            display: block; font-size: 10px; color: #a3aed0; 
            font-weight: 800; text-transform: uppercase; margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .info-box input, .info-box select {
            width: 100%; border: none; background: transparent; 
            font-size: 14px; color: #1b2559; font-weight: 700; 
            outline: none; font-family: inherit;
        }

        /* Action Button */
        .save-btn {
            margin-top: 25px; width: 100%;
            background: #4318ff; color: white; border: none;
            padding: 14px; border-radius: 15px; font-weight: 700;
            font-size: 16px; cursor: pointer; transition: 0.3s;
            box-shadow: 0px 10px 20px rgba(67, 24, 255, 0.2);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .save-btn:hover { background: #3311cc; transform: translateY(-2px); }
        .save-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="header-text">
            <h2>Employee Profile</h2>
            <p>Update your personal and professional information</p>
        </div>

        <div class="img-area">
            <img id="display_img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="profile-img" alt="Profile">
            <label for="file_input" class="upload-badge">
                <i class="fas fa-camera"></i>
            </label>
            <input type="file" id="file_input" style="display: none;" accept="image/*" onchange="uploadAndSaveImage(event)">
        </div>

        <div class="detail-grid">
            <div class="info-box"><label>Full Name</label><input type="text" id="p_name" placeholder="Name"></div>
            <div class="info-box"><label>Employee ID</label><input type="text" id="p_id" readonly style="color: #a3aed0; cursor: not-allowed;"></div>
            
            <div class="info-box">
                <label>Department</label>
                <select id="p_dept">
                    <option value="AIML">AI & Machine Learning</option>
                    <option value="DS">Data Science</option>
                    <option value="CS">Cyber Security</option>
                    <option value="IT">Information Technology</option>
                    <option value="CSE">Computer Science</option>
                    <option value="ECE">ECE</option>
                    <option value="EEE">EEE</option>
                    <option value="MECH">Mechanical</option>
                    <option value="CIVIL">Civil</option>
                    <option value="MBA">MBA</option>
                    <option value="PHARMA">Pharmacy</option>
                    <option value="GENERAL">General</option>
                </select>
            </div>

            <div class="info-box"><label>Designation</label><input type="text" id="p_role" placeholder="Current Role"></div>
            <div class="info-box"><label>Education</label><input type="text" id="p_edu" placeholder="Highest Qualification"></div>
            <div class="info-box">
                <label>Gender</label>
                <select id="p_gender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <button onclick="saveProfileChanges()" class="save-btn">
            <i class="fas fa-save"></i> Save Profile Details
        </button>
    </div>

    <script src="profile.js"></script>
</body>
</html>
