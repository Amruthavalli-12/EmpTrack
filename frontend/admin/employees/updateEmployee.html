<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Employee Details</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        /* Basic styling to ensure inputs are clear and organized */
        .form-box {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            display: block;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4318ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #3311cc;
        }
    </style>
</head>
<body>

    <div class="form-box">
        <h2>Update Employee</h2>
        
        <input type="text" id="id" placeholder="Employee ID (e.g. #101)">
        <input type="text" id="name" placeholder="Full Name">
        <input type="text" id="dept" placeholder="Department">
        <input type="number" id="salary" placeholder="Monthly Salary">

        <br>
        <button onclick="updateEmployee()">
            <i class="fas fa-sync-alt"></i> Update Employee Record
        </button>
    </div>

    <script src="employees.js"></script>
</body>
</html>
