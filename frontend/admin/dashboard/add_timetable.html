<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Timetable</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; padding: 25px; margin: 0; }
        .admin-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        h3 { color: #1b2559; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        
        .form-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-top: 15px; 
            align-items: flex-end;
        }

        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: 700; color: #a3aed0; margin-left: 5px; }

        input, select { 
            padding: 12px; border: 1px solid #f1f4f9; border-radius: 12px; 
            outline: none; background: #f8faff; font-weight: 600; color: #1b2559;
        }

        .add-btn { 
            background: #4318ff; color: white; border: none; padding: 13px 25px; 
            border-radius: 12px; cursor: pointer; font-weight: 700; 
            transition: 0.3s; height: 45px;
        }
        .add-btn:hover { background: #3311db; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(67, 24, 255, 0.3); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f4f9; }
        th { color: #a3aed0; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }
        
        .dept-tag { 
            background: #eef0f7; color: #4318ff; padding: 5px 12px; 
            border-radius: 8px; font-size: 12px; font-weight: 700; 
        }

        .delete-btn {
            background: #fff5f5; color: #ff5b5b; border: none; 
            width: 35px; height: 35px; border-radius: 10px; 
            cursor: pointer; transition: 0.3s;
        }
        .delete-btn:hover { background: #ff5b5b; color: white; }
    </style>
</head>
<body onload="loadAllSchedules()">

    <div class="admin-card">
        <h3><i class="fas fa-plus-circle"></i> Create Group Schedule</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Select Group / Department</label>
                <select id="dept">
                    <option value="AIML">AI & Machine Learning</option>
                    <option value="DS">Data Science</option>
                    <option value="CS">Cyber Security</option>
                    <option value="IT">Information Technology</option>
                    <option value="CSE">Computer Science (General)</option>
                    <option value="ECE">Electronics & Comm (ECE)</option>
                    <option value="EEE">Electrical & Electronics (EEE)</option>
                    <option value="MECH">Mechanical Engineering</option>
                    <option value="CIVIL">Civil Engineering</option>
                    <option value="MBA">MBA / Management</option>
                    <option value="PHARMA">Pharmacy</option>
                    <option value="GENERAL">General / Others</option>
                </select>
            </div>

            <div class="form-group">
                <label>Day</label>
                <select id="day">
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                </select>
            </div>

            <div class="form-group">
                <label>Task / Subject</label>
                <input type="text" id="task" placeholder="e.g. Workshop">
            </div>

            <div class="form-group">
                <label>Start Time</label>
                <input type="text" id="startTime" placeholder="09:00 AM">
            </div>

            <div class="form-group">
                <label>End Time</label>
                <input type="text" id="endTime" placeholder="11:00 AM">
            </div>

            <button class="add-btn" onclick="saveSchedule()">
                <i class="fas fa-save"></i> Add Schedule
            </button>
        </div>
    </div>

    <div class="admin-card">
        <h3><i class="fas fa-list"></i> Current Timetables</h3>
        <table>
            <thead>
                <tr>
                    <th>Department</th>
                    <th>Day</th>
                    <th>Time Period</th>
                    <th>Task Name</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="schedule_list">
                </tbody>
        </table>
    </div>

    <script src="add_timetable.js"></script>
</body>
</html>
